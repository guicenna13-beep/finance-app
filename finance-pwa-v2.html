// ── Mascot ───────────────────────────────────────────────────────────────────
function MascotFace({ state, size = 80, animated = true }) {
  const cfg = {
    saudavel:  { body:"#22c55e", shadow:"#16a34a", glow:"#4ade80",  cheeks:"#f9a8d4", mouth:"M 28 52 Q 40 62 52 52" },
    alerta:    { body:"#eab308", shadow:"#ca8a04", glow:"#fde047",  cheeks:"#fde047", mouth:"M 30 54 Q 40 50 50 54" },
    critico:   { body:"#ef4444", shadow:"#b91c1c", glow:"#f87171",  cheeks:"#fca5a5", mouth:"M 28 58 Q 40 48 52 58" },
    analitico: { body:"#8b5cf6", shadow:"#6d28d9", glow:"#a78bfa",  cheeks:"#c4b5fd", mouth:"M 30 54 L 50 54" },
  };
  const c = cfg[state] || cfg.saudavel;
  const eyeY = state==="alerta"?34:state==="critico"?32:35;
  return (
    <div style={{position:"relative",width:size,height:size}}>
      <div style={{position:"absolute",inset:-size*0.15,borderRadius:"50%",background:`radial-gradient(circle,${c.glow}44 0%,transparent 70%)`,animation:animated?"pulse-glow 2s ease-in-out infinite":"none",zIndex:0}}/>
      <svg width={size} height={size} viewBox="0 0 80 80" style={{position:"relative",zIndex:1}}>
        <ellipse cx="40" cy="75" rx="22" ry="5" fill={c.shadow} opacity="0.3"/>
        <circle cx="40" cy="40" r="32" fill={c.body}/>
        <circle cx="40" cy="34" r="32" fill={c.body}/>
        <ellipse cx="30" cy="22" rx="8" ry="5" fill="#ffffff33" transform="rotate(-20 30 22)"/>
        {state==="critico"&&<><line x1="20" y1="24" x2="32" y2="28" stroke={c.shadow} strokeWidth="3" strokeLinecap="round"/><line x1="48" y1="28" x2="60" y2="24" stroke={c.shadow} strokeWidth="3" strokeLinecap="round"/></>}
        {state==="alerta"&&<><line x1="20" y1="28" x2="32" y2="26" stroke={c.shadow} strokeWidth="2.5" strokeLinecap="round"/><line x1="48" y1="26" x2="60" y2="28" stroke={c.shadow} strokeWidth="2.5" strokeLinecap="round"/></>}
        {state==="analitico"&&<><line x1="20" y1="26" x2="32" y2="22" stroke={c.shadow} strokeWidth="3" strokeLinecap="round"/><line x1="48" y1="22" x2="60" y2="26" stroke={c.shadow} strokeWidth="3" strokeLinecap="round"/></>}
        <circle cx="27" cy={eyeY} r="7" fill="#fff"/><circle cx="53" cy={eyeY} r="7" fill="#fff"/>
        <circle cx="28" cy={eyeY} r="4" fill="#1a1a2e"/><circle cx="54" cy={eyeY} r="4" fill="#1a1a2e"/>
        <circle cx="29" cy={eyeY-1} r="1.5" fill="#fff"/><circle cx="55" cy={eyeY-1} r="1.5" fill="#fff"/>
        <ellipse cx="20" cy="46" rx="5" ry="3" fill={c.cheeks} opacity="0.6"/>
        <ellipse cx="60" cy="46" rx="5" ry="3" fill={c.cheeks} opacity="0.6"/>
        <path d={c.mouth} stroke={c.shadow} strokeWidth="3" fill="none" strokeLinecap="round"/>
        {state==="critico"&&<><ellipse cx="65" cy="28" rx="2.5" ry="4" fill="#93c5fd" opacity="0.8"/><ellipse cx="68" cy="33" rx="1.5" ry="2.5" fill="#93c5fd" opacity="0.6"/></>}
        {state==="analitico"&&<><circle cx="53" cy={eyeY} r="9" fill="none" stroke="#fde047" strokeWidth="1.5" opacity="0.8"/><line x1="62" y1={eyeY+6} x2="67" y2={eyeY+10} stroke="#fde047" strokeWidth="1.5"/></>}
      </svg>
    </div>
  );
}

// ── Donut Chart ───────────────────────────────────────────────────────────────
function DonutChart({ data, total }) {
  const size=160, cx=80, cy=80, r=58, ir=36;
  let cum = -Math.PI/2;
  const slices = data.map(d => {
    const a = (d.value/total)*2*Math.PI, s=cum; cum+=a;
    const large=a>Math.PI?1:0;
    const path=`M ${cx+r*Math.cos(s)} ${cy+r*Math.sin(s)} A ${r} ${r} 0 ${large} 1 ${cx+r*Math.cos(s+a)} ${cy+r*Math.sin(s+a)} L ${cx+ir*Math.cos(s+a)} ${cy+ir*Math.sin(s+a)} A ${ir} ${ir} 0 ${large} 0 ${cx+ir*Math.cos(s)} ${cy+ir*Math.sin(s)} Z`;
    return {...d, path};
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity="0.9"><title>{s.label}: R${s.value.toFixed(0)}</title></path>)}
      <circle cx={cx} cy={cy} r={ir} fill="#0f0f1a"/>
      <text x={cx} y={cy-6} textAnchor="middle" fill="#94a3b8" fontSize="9" fontFamily="monospace">GASTOS</text>
      <text x={cx} y={cy+8} textAnchor="middle" fill="#f8fafc" fontSize="13" fontWeight="bold" fontFamily="monospace">R${total.toFixed(0)}</text>
    </svg>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const now = new Date();
  const [transactions, setTransactions] = useState(() => LS.get("fin_tx", DEFAULT_TX));
  const [categories, setCategories]     = useState(() => LS.get("fin_cats", DEFAULT_CATS));
  const [activeTab, setActiveTab]       = useState("dashboard");
  const [currentMonth, setCurrentMonth] = useState(now.getMonth());
  const [currentYear, setCurrentYear]   = useState(now.getFullYear());
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingTx, setEditingTx]       = useState(null);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
  const [showCatModal, setShowCatModal] = useState(false);
  const [showEmojiPicker, setShowEmojiPicker] = useState(false);
  const [mascotBounce, setMascotBounce] = useState(false);
  const [catForm, setCatForm] = useState({ label:"", icon:"⭐", color:"#60a5fa" });

  const [form, setForm] = useState({
    desc:"", amount:"", type:"despesa", category:"outros",
    method:"debito", parcelas:1, date: now.toISOString().split("T")[0]
  });

  // persist
  useEffect(() => { LS.set("fin_tx", transactions); }, [transactions]);
  useEffect(() => { LS.set("fin_cats", categories); }, [categories]);

  // month label
  const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const monthLabel = `${MONTHS[currentMonth]} ${currentYear}`;

  const prevMonth = () => {
    if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y=>y-1); }
    else setCurrentMonth(m=>m-1);
  };
  const nextMonth = () => {
    if (currentMonth === 11) { setCurrentMonth(0); setCurrentYear(y=>y+1); }
    else setCurrentMonth(m=>m+1);
  };
  const goToday = () => { setCurrentMonth(now.getMonth()); setCurrentYear(now.getFullYear()); };

  // filter to current month
  const monthTx = transactions.filter(t => {
    const d = new Date(t.date + "T12:00:00");
    return d.getMonth()===currentMonth && d.getFullYear()===currentYear;
  });

  // derived
  const receitas       = monthTx.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const despesasDebito = monthTx.filter(t=>t.amount<0&&(t.method==="debito"||t.method==="pix")).reduce((s,t)=>s+Math.abs(t.amount),0);
  const fatura         = monthTx.filter(t=>t.amount<0&&t.method==="credito").reduce((s,t)=>s+Math.abs(t.amount),0);
  const saldo          = receitas - despesasDebito;
  const totalDespesas  = despesasDebito + fatura;
  const lazerApps      = monthTx.filter(t=>t.amount<0&&(t.category==="lazer"||t.category==="apps")).reduce((s,t)=>s+Math.abs(t.amount),0);
  const lazerPct       = totalDespesas>0?(lazerApps/totalDespesas)*100:0;
  const saldoPct       = receitas>0?(saldo/receitas)*100:0;

  const mascotState = lazerPct>35?"analitico":saldoPct<10?"critico":saldoPct<40?"alerta":"saudavel";
  const stateColors = {saudavel:"#22c55e",alerta:"#eab308",critico:"#ef4444",analitico:"#8b5cf6"};
  const stateColor  = stateColors[mascotState];

  const MESSAGES = {
    saudavel: ["Estamos bem hoje! 💪","Seu bolso agradece!","Economia on fire! 🔥"],
    alerta:   ["Cuidado com os gastos!","Tá apertando um pouco...","Hora de frear 🛑"],
    critico:  ["Dê tchau pra esse dinheiro 😱","Carteira em modo SOS!","Para de gastar NOW!"],
    analitico:["Lazer demais... 🤨","Apps viraram hobby caro","Custo do entretenimento alto"],
  };
  const balloon = MESSAGES[mascotState][0];

  useEffect(() => {
    setMascotBounce(true);
    const t = setTimeout(()=>setMascotBounce(false),600);
    return ()=>clearTimeout(t);
  }, [mascotState]);

  const catData = categories.map(cat => {
    const val = monthTx.filter(t=>t.category===cat.id&&t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
    return {label:cat.label, value:val, color:cat.color, icon:cat.icon};
  }).filter(d=>d.value>0);

  // ── installment: toggle paid ──
  const togglePaid = (id) => {
    setTransactions(prev => prev.map(t =>
      t.id===id && t.installment ? {...t, installment:{...t.installment, paid:!t.installment.paid}} : t
    ));
  };

  // ── open edit ──
  const openEdit = (tx) => {
    setEditingTx(tx);
    setForm({
      desc:tx.desc, amount:Math.abs(tx.amount).toString(),
      type:tx.amount>0?"receita":"despesa",
      category:tx.category, method:tx.method, parcelas:1, date:tx.date
    });
    setShowAddModal(true);
  };

  // ── delete ──
  const handleDelete = (tx) => {
    if (tx.groupId) {
      setTransactions(prev => prev.filter(t => t.groupId !== tx.groupId));
    } else {
      setTransactions(prev => prev.filter(t => t.id !== tx.id));
    }
    setShowDeleteConfirm(null);
    bounce();
  };

  // ── save transaction ──
  const handleSave = () => {
    if (!form.desc || !form.amount) return;
    const amt = parseFloat(form.amount);
    const finalAmt = form.type==="despesa" ? -Math.abs(amt) : Math.abs(amt);

    if (editingTx) {
      setTransactions(prev => prev.map(t => t.id===editingTx.id
        ? {...t, desc:form.desc, amount:finalAmt, type:form.type, category:form.category, method:form.type==="receita"?"pix":form.method, date:form.date}
        : t
      ));
      setEditingTx(null);
    } else if (form.type==="despesa" && form.method==="credito" && form.parcelas>1) {
      const gId = "g" + Date.now();
      const parcAmt = finalAmt / form.parcelas;
      const parc = Array.from({length:form.parcelas},(_,i)=>{
        const d = new Date(form.date+"T12:00:00");
        d.setMonth(d.getMonth()+i);
        return {
          id: Date.now()+i, desc:form.desc, amount:parcAmt,
          type:"despesa", category:form.category, method:"credito",
          date: d.toISOString().split("T")[0],
          groupId: gId,
          installment: {current:i+1, total:form.parcelas, paid:false}
        };
      });
      setTransactions(prev=>[...prev,...parc]);
    } else {
      setTransactions(prev=>[...prev,{
        id:Date.now(), desc:form.desc, amount:finalAmt, type:form.type,
        category:form.category, method:form.type==="receita"?"pix":form.method,
        date:form.date, groupId:null, installment:null
      }]);
    }
    closeModal();
    bounce();
  };

  const closeModal = () => {
    setShowAddModal(false);
    setEditingTx(null);
    setForm({desc:"",amount:"",type:"despesa",category:"outros",method:"debito",parcelas:1,date:now.toISOString().split("T")[0]});
  };

  const bounce = () => { setMascotBounce(true); setTimeout(()=>setMascotBounce(false),600); };

  // ── add category ──
  const handleAddCategory = () => {
    if (!catForm.label) return;
    const id = "cat_" + Date.now();
    const newCat = {id, label:catForm.label, icon:catForm.icon, color:catForm.color, custom:true};
    setCategories(prev=>[...prev,newCat]);
    setCatForm({label:"",icon:"⭐",color:"#60a5fa"});
    setShowCatModal(false);
  };

  const deleteCategory = (id) => {
    setCategories(prev=>prev.filter(c=>c.id!==id));
  };

  const sortedTx = [...monthTx].sort((a,b)=>new Date(b.date)-new Date(a.date));

  // installments due in current month (any group)
  const installmentsDue = transactions.filter(t=>t.installment&&monthTx.some(m=>m.id===t.id));

  return (
    <div style={{minHeight:"100vh",background:"#080812",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:"#f8fafc",maxWidth:420,margin:"0 auto",position:"relative"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        @keyframes pulse-glow{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
        @keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}60%{transform:translateY(-4px)}}
        @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes balloon-in{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
        .bounce-anim{animation:bounce .6s ease}
        .card{background:#12121f;border:1px solid #1e1e35;border-radius:20px}
        .tab-btn,.add-btn,.icon-btn{background:none;border:none;cursor:pointer;transition:all .2s}
        input,select{outline:none}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1e1e35;border-radius:4px}
      `}</style>

      {/* Ambient glow */}
      <div style={{position:"fixed",top:-100,left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:`radial-gradient(circle,${stateColor}18 0%,transparent 70%)`,transition:"background 1.2s",pointerEvents:"none",zIndex:0}}/>

      {/* ── HEADER ── */}

        <div style={{display:"flex",alignItems:"center",gap:14,background:"#12121f",border:`1px solid ${stateColor}44`,borderRadius:24,padding:"12px 16px",boxShadow:`0 0 30px ${stateColor}22`,transition:"all 1s"}}>
          <div className={mascotBounce?"bounce-anim":""} style={{flexShrink:0,cursor:"pointer"}} onClick={bounce}>
            <MascotFace state={mascotState} size={60}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{background:"#1a1a2e",borderRadius:10,padding:"6px 10px",fontSize:11,color:"#e2e8f0",marginBottom:6,border:`1px solid ${stateColor}55`,animation:"balloon-in .4s ease",display:"inline-block",maxWidth:"100%"}}>
              <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:stateColor,marginRight:5,animation:"pulse-glow 2s infinite"}}/>
              {balloon}

            <div style={{fontSize:22,fontWeight:700,color:saldo>=0?"#4ade80":"#f87171",fontFamily:"'DM Mono',monospace",lineHeight:1.1}}>
              R$ {Math.abs(saldo).toLocaleString("pt-BR",{minimumFractionDigits:2})}

                  <button key={col} onClick={()=>setCatForm(f=>({...f,color:col}))} style={{width:28,height:28,borderRadius:"50%",background:col,border:catForm.color===col?"3px solid #fff":"3px solid transparent",cursor:"pointer"}}/>
                ))}
              </div>
            </div>

            {/* Preview */}
            <div style={{background:"#1a1a2e",borderRadius:13,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:14,border:`1px solid ${catForm.color}44`}}>
              <div style={{width:36,height:36,borderRadius:10,background:`${catForm.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`1px solid ${catForm.color}44`}}>{catForm.icon}</div>
              <div style={{fontSize:13,fontWeight:600,color:"#f8fafc"}}>{catForm.label||"Nome da categoria"}</div>
            </div>

            <button onClick={handleAddCategory} style={{width:"100%",padding:13,borderRadius:14,fontSize:14,fontWeight:700,background:`linear-gradient(135deg,${catForm.color},${catForm.color}bb)`,color:"#0f0f1a",border:"none",cursor:"pointer"}}>
              Criar Categoria
            </button>
          </div>
        </div>
      )}

      {/* iOS install banner */}
      <div id="ios-banner" style={{display:"none",position:"fixed",bottom:0,left:0,right:0,zIndex:9999,background:"#1a1a2e",borderTop:"1px solid #22c55e44",padding:"12px 16px 28px",alignItems:"center",gap:10}}>
        <div style={{fontSize:28}}>📲</div>
        <div style={{flex:1}}>
          <div style={{color:"#f8fafc",fontSize:13,fontWeight:600}}>Instalar no iPhone</div>
          <div style={{color:"#94a3b8",fontSize:11,marginTop:2}}>Toque em <strong style={{color:"#60a5fa"}}>⎙ Compartilhar</strong> → "Adicionar à Tela de Início"</div>
        </div>
        <button id="dismiss-ios" style={{background:"#1e1e35",border:"none",color:"#64748b",width:26,height:26,borderRadius:"50%",cursor:"pointer",fontSize:14}}>×</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

<script>
// iOS install banner
window.addEventListener('load',()=>{
  const isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone=window.navigator.standalone;
  const banner=document.getElementById('ios-banner');
  if(isIOS&&!isStandalone&&!localStorage.getItem('pwa-dismissed')){
    banner.style.display='flex';
    document.getElementById('dismiss-ios').addEventListener('click',()=>{
      banner.style.display='none';
      localStorage.setItem('pwa-dismissed','1');
    });
  }
});

// Service Worker
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='financeapp-v2';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{self.clients.claim();});
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
