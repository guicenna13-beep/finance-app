        };
        const c = configs[state] || configs.saudavel;
        return (
            <div style={{ position: "relative", width: size, height: size }}>
                <div style={{ position: "absolute", inset: -size * 0.15, borderRadius: "50%", background: `radial-gradient(circle, ${c.glow}44 0%, transparent 70%)`, animation: animated ? "pulse-glow 2s ease-in-out infinite" : "none" }} />
                <svg width={size} height={size} viewBox="0 0 80 80" style={{ position: "relative" }}>

                </svg>
            </div>
        );
    }

    function DonutChart({ data, total }) {
        const size = 160; const cx = 80, cy = 80, r = 58, innerR = 36;
        let cumAngle = -Math.PI / 2;
        const slices = data.map(d => {
            const angle = (d.value / total) * 2 * Math.PI;
            const start = cumAngle; cumAngle += angle;
            const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
            const x2 = cx + r * Math.cos(start + angle), y2 = cy + r * Math.sin(start + angle);
            const ix1 = cx + innerR * Math.cos(start), iy1 = cy + innerR * Math.sin(start);
            const ix2 = cx + innerR * Math.cos(start + angle), iy2 = cy + innerR * Math.sin(start + angle);
            const path = `M ${x1} ${y1} A ${r} ${r} 0 ${angle > Math.PI ? 1 : 0} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${innerR} ${innerR} 0 ${angle > Math.PI ? 1 : 0} 0 ${ix1} ${iy1} Z`;
            return { ...d, path };
        });
        return (
            <svg width={size} height={size}>
                {slices.map((s, i) => <path key={i} d={s.path} fill={s.color} opacity="0.9" />)}
                <circle cx={cx} cy={cy} r={innerR} fill="#0f0f1a" />
                <text x={cx} y={cy+5} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">R${total.toFixed(0)}</text>
            </svg>
        );
    }
