  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const INITIAL_TRANSACTIONS = [
  { id: 1, desc: "Salário Base", amount: 5800, type: "receita", category: "trabalho", date: new Date().toISOString().split("T")[0], method: "pix" },
];

const CATEGORIES = [
  { id: "trabalho", label: "Trabalho", icon: "💼" },
  { id: "moradia", label: "Moradia", icon: "🏠" },
  { id: "alimentacao", label: "Alimentação", icon: "🛒" },
  { id: "lazer", label: "Lazer", icon: "🎮" },
  { id: "apps", label: "Apps/Streaming", icon: "📱" },
  { id: "saude", label: "Saúde", icon: "❤️" },
  { id: "transporte", label: "Transporte", icon: "🚗" },
  { id: "outros", label: "Outros", icon: "📦" },
];

const CAT_COLORS = {
  trabalho: "#4ade80", moradia: "#60a5fa", alimentacao: "#f97316",
  lazer: "#a78bfa", apps: "#f472b6", saude: "#34d399", transporte: "#fbbf24", outros: "#94a3b8"
};

const MESSAGES = {
  saudavel: ["Estamos bem hoje! 💪", "Seu bolso agradece!", "Economia nota 10! 🔥", "Tudo sob controle."],
  alerta: ["Cuidado com os gastos!", "Tá apertando um pouco...", "Hora de frear 🛑", "Revisa os extras?"],
  critico: ["Dê tchau pra esse dinheiro 😱", "Socorro, cadê o saldo?", "Carteira em perigo!", "Pare de gastar agora!"],
  analitico: ["Lazer demais hoje? 🤨", "Muitos apps e streams", "Hora de analisar custos", "Diversão custa caro!"]
};

// ─── COMPONENTES ─────────────────────────────────────────────────────────────

function MascotFace({ state, size = 80, animated = true }) {
  const configs = {
    saudavel: { body: "#22c55e", shadow: "#16a34a", glow: "#4ade80", eyes: "#fff", pupils: "#1a1a2e", mouth: "M 28 52 Q 40 62 52 52", cheeks: "#f9a8d4" },
    alerta: { body: "#eab308", shadow: "#ca8a04", glow: "#fde047", eyes: "#fff", pupils: "#1a1a2e", mouth: "M 30 54 Q 40 50 50 54", cheeks: "#fde047" },
    critico: { body: "#ef4444", shadow: "#b91c1c", glow: "#f87171", eyes: "#fff", pupils: "#1a1a2e", mouth: "M 28 58 Q 40 48 52 58", cheeks: "#fca5a5" },
    analitico: { body: "#8b5cf6", shadow: "#6d28d9", glow: "#a78bfa", eyes: "#fff", pupils: "#1a1a2e", mouth: "M 30 54 L 50 54", cheeks: "#c4b5fd" }
  };

  const c = configs[state] || configs.saudavel;
  const eyeY = state === "alerta" ? 34 : state === "critico" ? 32 : 35;

  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <div style={{
        position: "absolute", inset: -size * 0.15,
        borderRadius: "50%",
        background: `radial-gradient(circle, ${c.glow}44 0%, transparent 70%)`,
        animation: animated ? "pulse-glow 2s ease-in-out infinite" : "none",
        zIndex: 0
      }} />
      <svg width={size} height={size} viewBox="0 0 80 80" style={{ position: "relative", zIndex: 1 }}>
        <ellipse cx="40" cy="75" rx="22" ry="5" fill={c.shadow} opacity="0.3" />
        <circle cx="40" cy="40" r="32" fill={c.body} />
        <circle cx="40" cy="34" r="32" fill={c.body} />
        <ellipse cx="30" cy="22" rx="8" ry="5" fill="#ffffff33" transform="rotate(-20 30 22)" />
        {state === "analitico" && (
          <g stroke={c.shadow} strokeWidth="3" strokeLinecap="round">
            <line x1="20" y1="26" x2="32" y2="24" />
            <line x1="48" y1="24" x2="60" y2="26" />
          </g>
        )}
        <circle cx="27" cy={eyeY} r="7" fill={c.eyes} />
        <circle cx="53" cy={eyeY} r="7" fill={c.eyes} />
        <circle cx="28" cy={eyeY} r="4" fill={c.pupils} />
        <circle cx="54" cy={eyeY} r="4" fill={c.pupils} />
        <path d={c.mouth} stroke={c.shadow} strokeWidth="3" fill="none" strokeLinecap="round" />
        {state === "analitico" && (
           <circle cx="53" cy={eyeY} r="9" fill="none" stroke="#fde047" strokeWidth="1.5" opacity="0.8" />
        )}
      </svg>
    </div>
  );
}

function DonutChart({ data, total }) {
  const size = 160;
  const cx = size / 2, cy = size / 2, r = 58, innerR = 36;
  let cumAngle = -Math.PI / 2;
  const slices = data.map(d => {
    const angle = total > 0 ? (d.value / total) * 2 * Math.PI : 0;
    const start = cumAngle;
    cumAngle += angle;
    const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
    const x2 = cx + r * Math.cos(start + angle), y2 = cy + r * Math.sin(start + angle);
    const ix1 = cx + innerR * Math.cos(start), iy1 = cy + innerR * Math.sin(start);
    const ix2 = cx + innerR * Math.cos(start + angle), iy2 = cy + innerR * Math.sin(start + angle);
    const large = angle > Math.PI ? 1 : 0;
    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${innerR} ${innerR} 0 ${large} 0 ${ix1} ${iy1} Z`;
    return { ...d, path };
  });

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {total === 0 ? (
        <circle cx={cx} cy={cy} r={r} fill="#1e1e35" />
      ) : (
        slices.map((s, i) => (
          <path key={i} d={s.path} fill={s.color} opacity="0.9" style={{ transition: "all 0.5s" }} />
        ))
      )}
      <circle cx={cx} cy={cy} r={innerR} fill="#0f0f1a" />
      <text x={cx} y={cy - 6} textAnchor="middle" fill="#94a3b8" fontSize="9" fontFamily="monospace">GASTOS</text>
      <text x={cx} y={cy + 8} textAnchor="middle" fill="#f8fafc" fontSize="13" fontWeight="bold" fontFamily="monospace">
        R${total.toFixed(0)}
      </text>
    </svg>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
function App() {
  const [transactions, setTransactions] = useState(() => {
    const saved = localStorage.getItem("finance_txs_v1");
    return saved ? JSON.parse(saved) : INITIAL_TRANSACTIONS;
  });

  const [activeTab, setActiveTab] = useState("dashboard");
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingTx, setEditingTx] = useState(null);
  const [mascotBounce, setMascotBounce] = useState(false);
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  });

  // Persistência
  useEffect(() => {
    localStorage.setItem("finance_txs_v1", JSON.stringify(transactions));
  }, [transactions]);

  // Estado do formulário
  const [form, setForm] = useState({
    desc: "", amount: "", type: "despesa", category: "outros",
    method: "debito", parcelas: 1, date: new Date().toISOString().split("T")[0]
  });

  // Transações filtradas
  const filteredTransactions = useMemo(() => {
    return transactions.filter(t => t.date.startsWith(currentMonth));
  }, [transactions, currentMonth]);

  // Cálculos
  const receitas = filteredTransactions.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const totalDespesas = filteredTransactions.filter(t => t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0);
  const fatura = filteredTransactions.filter(t => t.amount < 0 && t.method === "credito").reduce((s, t) => s + Math.abs(t.amount), 0);
  const saldo = receitas - totalDespesas;

  const lazerApps = filteredTransactions.filter(t => t.amount < 0 && (t.category === "lazer" || t.category === "apps")).reduce((s, t) => s + Math.abs(t.amount), 0);
  const lazerPct = totalDespesas > 0 ? (lazerApps / totalDespesas) * 100 : 0;
  const saldoPct = receitas > 0 ? (saldo / receitas) * 100 : 0;

  const mascotState = lazerPct > 35 ? "analitico" : saldoPct < 10 ? "critico" : saldoPct < 30 ? "alerta" : "saudavel";
  const balloon = useMemo(() => {
    const msgs = MESSAGES[mascotState];
    return msgs[Math.floor(Math.random() * msgs.length)];
  }, [mascotState]);

  const catData = CATEGORIES.map(cat => {
    const val = filteredTransactions.filter(t => t.category === cat.id && t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0);
    return { label: cat.label, value: val, color: CAT_COLORS[cat.id], icon: cat.icon };
  }).filter(d => d.value > 0);

  const openEdit = (tx) => {
    setEditingTx(tx);
    setForm({
      desc: tx.desc,
      amount: Math.abs(tx.amount).toString(),
      type: tx.amount > 0 ? "receita" : "despesa",
      category: tx.category,
      method: tx.method || "debito",
      parcelas: 1,
      date: tx.date
    });
    setShowAddModal(true);
  };

  const handleAddTransaction = () => {
    if (!form.desc || !form.amount) return;
    const amt = parseFloat(form.amount);
    const finalAmt = form.type === "despesa" ? -Math.abs(amt) : Math.abs(amt);
    
    if (editingTx) {
      setTransactions(prev => prev.map(t => t.id === editingTx.id
        ? { ...t, desc: form.desc, amount: finalAmt, type: form.type, category: form.category, method: form.method, date: form.date }
        : t
      ));
      setEditingTx(null);
    } else {
      if (form.type === "despesa" && form.method === "credito" && form.parcelas > 1) {
        const parc = [];
        for (let i = 0; i < form.parcelas; i++) {
          const d = new Date(form.date);
          d.setMonth(d.getMonth() + i);
          parc.push({ 
            id: Date.now() + i, 
            desc: `${form.desc} (${i+1}/${form.parcelas})`, 
            amount: finalAmt / form.parcelas, 
            type: "despesa", 
            category: form.category, 
            method: "credito", 
            date: d.toISOString().split("T")[0] 
          });
        }
        setTransactions(prev => [...prev, ...parc]);
      } else {
        const newTx = { 
          id: Date.now(), 
          desc: form.desc, 
          amount: finalAmt, 
          type: form.type, 
          category: form.category, 
          method: form.type === "receita" ? "pix" : form.method, 
          date: form.date 
        };
        setTransactions(prev => [...prev, newTx]);
      }
    }
    setShowAddModal(false);
    setForm({ desc: "", amount: "", type: "despesa", category: "outros", method: "debito", parcelas: 1, date: new Date().toISOString().split("T")[0] });
    setMascotBounce(true);
    setTimeout(() => setMascotBounce(false), 600);
  };

  const stateColor = { saudavel: "#22c55e", alerta: "#eab308", critico: "#ef4444", analitico: "#8b5cf6" }[mascotState];
  const sortedTx = [...filteredTransactions].sort((a, b) => new Date(b.date) - new Date(a.date));

  return (
    <div style={{
      minHeight: "100vh", background: "#080812",
      fontFamily: "'DM Sans', sans-serif",
      color: "#f8fafc", maxWidth: 420, margin: "0 auto",
      position: "relative", overflow: "hidden"
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes pulse-glow { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} 60%{transform:translateY(-3px)} }
        @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .card { background: #12121f; border: 1px solid #1e1e35; border-radius: 20px; }
        input, select { outline: none; border: none; font-family: inherit; }
        button { cursor: pointer; border: none; font-family: inherit; }
      `}</style>

      {/* Glow de fundo dinâmico */}
      <div style={{
        position: "fixed", top: -50, left: "50%", transform: "translateX(-50%)",
        width: 300, height: 300, borderRadius: "50%",
        background: `radial-gradient(circle, ${stateColor}15 0%, transparent 70%)`,
        transition: "background 1s ease", pointerEvents: "none", zIndex: 0
      }} />

      {/* ── HEADER ── */}
      <div style={{ padding: "40px 20px 10px", position: "relative", zIndex: 1 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: "#64748b", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>
            FinanceApp Pro
          </div>
          <input type="month" value={currentMonth} onChange={e => setCurrentMonth(e.target.value)} 
            style={{ 
              background: "#12121f", color: "#f8fafc", padding: "6px 12px", 
              borderRadius: "10px", fontSize: 12, border: "1px solid #1e1e35" 
            }} 
          />
        </div>

        <div style={{
          display: "flex", alignItems: "center", gap: 16,
          background: "#12121f", border: `1px solid ${stateColor}33`,
          borderRadius: 24, padding: "16px",
          boxShadow: `0 8px 30px #00000044`
        }}>
          <div style={{ flexShrink: 0, animation: mascotBounce ? "bounce 0.6s" : "none" }}>
            <MascotFace state={mascotState} size={64} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{
              background: "#1a1a2e", borderRadius: "10px 10px 10px 2px", padding: "6px 12px",
              fontSize: 11, color: "#cbd5e1", marginBottom: 6, border: `1px solid ${stateColor}44`,
              display: "inline-block"
            }}>
               {balloon}
            </div>
            <div>
              <div style={{ fontSize: 10, color: "#64748b", fontFamily: "'DM Mono', monospace" }}>SALDO DO MÊS</div>
              <div style={{
                fontSize: 26, fontWeight: 700, color: saldo >= 0 ? "#4ade80" : "#f87171",
                fontFamily: "'DM Mono', monospace", lineHeight: 1
              }}>
                R$ {Math.abs(saldo).toLocaleString("pt-BR", { minimumFractionDigits: 2 })}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ── TABS ── */}
      <div style={{ display: "flex", padding: "10px 20px", gap: 8, position: "relative", zIndex: 1 }}>
        {[
          { id: "dashboard", label: "Dashboard" },
          { id: "transacoes", label: "Extrato" },
          { id: "resumo", label: "Metas" }
        ].map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            style={{
              flex: 1, padding: "10px", borderRadius: 14, fontSize: 12, fontWeight: 600,
              background: activeTab === tab.id ? stateColor : "#12121f",
              color: activeTab === tab.id ? "#0f0f1a" : "#64748b",
              transition: "all 0.3s"
            }}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* ── CONTEÚDO ── */}
      <div style={{ padding: "10px 20px 120px", position: "relative", zIndex: 1 }}>

        {/* ── DASHBOARD ── */}
        {activeTab === "dashboard" && (
          <div style={{ animation: "fadein 0.4s ease" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <div className="card" style={{ padding: 14 }}>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>Receitas</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#4ade80", fontFamily: "'DM Mono', monospace" }}>
                  R${receitas.toFixed(0)}
                </div>
              </div>
              <div className="card" style={{ padding: 14 }}>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>Despesas</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#f87171", fontFamily: "'DM Mono', monospace" }}>
                  R${totalDespesas.toFixed(0)}
                </div>
              </div>
            </div>

            <div className="card" style={{ padding: 16, marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#94a3b8", marginBottom: 12 }}>Categorias de Gasto</div>
              <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                <DonutChart data={catData} total={totalDespesas} />
                <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
                  {catData.slice(0, 4).map((d, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: d.color }} />
                      <span style={{ fontSize: 11, color: "#94a3b8", flex: 1 }}>{d.label}</span>
                      <span style={{ fontSize: 11, color: "#f8fafc", fontFamily: "'DM Mono', monospace" }}>{totalDespesas > 0 ? ((d.value/totalDespesas)*100).toFixed(0) : 0}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {lazerPct > 30 && (
              <div style={{ background: "#8b5cf615", border: "1px solid #8b5cf633", borderRadius: 16, padding: 16, display: "flex", gap: 12 }}>
                <span style={{ fontSize: 24 }}>🤨</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#a78bfa" }}>Cuidado com o Lazer!</div>
                  <div style={{ fontSize: 11, color: "#94a3b8" }}>Já usaste {lazerPct.toFixed(0)}% das despesas em diversão este mês.</div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── EXTRATO ── */}
        {activeTab === "transacoes" && (
          <div style={{ animation: "fadein 0.4s ease" }}>
            {sortedTx.length === 0 ? (
              <div style={{ textAlign: "center", padding: "40px 0", color: "#64748b" }}>
                Sem movimentos este mês. 🌿
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {sortedTx.map(tx => (
                  <div key={tx.id} className="card" style={{ padding: "12px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 12, background: "#1e1e35", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>
                      {CATEGORIES.find(c => c.id === tx.category)?.icon || "📦"}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{tx.desc}</div>
                      <div style={{ fontSize: 11, color: "#475569" }}>{tx.date.split("-").reverse().join("/")}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: tx.amount > 0 ? "#4ade80" : "#f87171", fontFamily: "'DM Mono', monospace" }}>
                        {tx.amount > 0 ? "+" : ""}R${Math.abs(tx.amount).toFixed(2)}
                      </div>
                      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 4 }}>
                        <button onClick={() => openEdit(tx)} style={{ background: "transparent", color: "#60a5fa", fontSize: 12 }}>Editar</button>
                        <button onClick={() => setTransactions(prev => prev.filter(t => t.id !== tx.id))} style={{ background: "transparent", color: "#f87171", fontSize: 12 }}>Apagar</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── METAS ── */}
        {activeTab === "resumo" && (
          <div style={{ animation: "fadein 0.4s ease" }}>
             <div className="card" style={{ padding: 20, marginBottom: 16, background: "linear-gradient(135deg, #12121f, #1a0f2e)" }}>
                <div style={{ fontSize: 11, color: "#8b5cf6", fontWeight: 700, textTransform: "uppercase" }}>STATUS FINANCEIRO</div>
                <div style={{ fontSize: 24, fontWeight: 800, marginTop: 4 }}>
                  Nível {Math.max(1, Math.floor(receitas / 1000))}
                </div>
                <div style={{ height: 6, background: "#1e1e35", borderRadius: 10, marginTop: 12, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${Math.min(100, Math.max(0, (saldo/receitas)*100))}%`, background: "#8b5cf6" }} />
                </div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 8 }}>{saldoPct.toFixed(0)}% da renda guardada</div>
             </div>

             <div style={{ fontSize: 13, fontWeight: 600, color: "#94a3b8", marginBottom: 12 }}>Checklist do Mês</div>
             {[
               { l: "Saldo Positivo", d: saldo > 0 },
               { l: "Cartão < R$ 1.500", d: fatura < 1500 },
               { l: "Lazer sob controle", d: lazerPct < 25 },
               { l: "Poupar > 10%", d: saldoPct > 10 }
             ].map((g, i) => (
               <div key={i} className="card" style={{ padding: 14, marginBottom: 8, display: "flex", justifyContent: "space-between", border: `1px solid ${g.d ? "#22c55e33" : "#1e1e35"}` }}>
                 <span style={{ fontSize: 13, color: g.d ? "#f8fafc" : "#64748b" }}>{g.l}</span>
                 <span>{g.d ? "✅" : "⭕"}</span>
               </div>
             ))}
          </div>
        )}

      </div>

      {/* ── BOTÃO ADICIONAR ── */}
      <button onClick={() => setShowAddModal(true)} style={{
        position: "fixed", bottom: 30, left: "50%", transform: "translateX(-50%)",
        width: 64, height: 64, borderRadius: "50%", background: stateColor,
        color: "#0f0f1a", fontSize: 32, fontWeight: "bold", zIndex: 50,
        boxShadow: `0 8px 24px ${stateColor}66`
      }}>+</button>

      {/* ── MODAL DE ADIÇÃO/EDIÇÃO ── */}
      {showAddModal && (
        <div style={{ position: "fixed", inset: 0, background: "#000000aa", zIndex: 100, display: "flex", alignItems: "flex-end" }}
          onClick={e => e.target === e.currentTarget && setShowAddModal(false)}>
          <div style={{ width: "100%", background: "#12121f", borderRadius: "24px 24px 0 0", padding: 24, animation: "slideUp 0.3s ease" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
              <div style={{ fontSize: 18, fontWeight: 700 }}>{editingTx ? "Editar Registo" : "Novo Registo"}</div>
              <button onClick={() => { setShowAddModal(false); setEditingTx(null); }} style={{ background: "transparent", color: "#64748b", fontSize: 24 }}>×</button>
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              {["despesa", "receita"].map(t => (
                <button key={t} onClick={() => setForm(f => ({ ...f, type: t }))}
                  style={{ flex: 1, padding: 12, borderRadius: 12, background: form.type === t ? (t === "receita" ? "#22c55e" : "#ef4444") : "#1e1e35", color: form.type === t ? "#fff" : "#64748b", fontWeight: 700 }}>
                  {t.toUpperCase()}
                </button>
              ))}
            </div>

            <input placeholder="Descrição" value={form.desc} onChange={e => setForm(f => ({ ...f, desc: e.target.value }))}
              style={{ width: "100%", background: "#1a1a2e", color: "#fff", padding: 14, borderRadius: 12, marginBottom: 12 }} />
            
            <input type="number" placeholder="Valor R$" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))}
              style={{ width: "100%", background: "#1a1a2e", color: "#fff", padding: 14, borderRadius: 12, marginBottom: 12 }} />

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
              <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}
                style={{ background: "#1a1a2e", color: "#fff", padding: 12, borderRadius: 12 }}>
                {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
              </select>
              <select value={form.method} onChange={e => setForm(f => ({ ...f, method: e.target.value }))}
                style={{ background: "#1a1a2e", color: "#fff", padding: 12, borderRadius: 12 }}>
                <option value="debito">💳 Débito</option>
                <option value="pix">⚡ Pix</option>
                <option value="credito">🏦 Crédito</option>
              </select>
            </div>

            <input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))}
              style={{ width: "100%", background: "#1a1a2e", color: "#fff", padding: 12, borderRadius: 12, marginBottom: 20 }} />

            <button onClick={handleAddTransaction} style={{ width: "100%", background: stateColor, color: "#0f0f1a", padding: 16, borderRadius: 16, fontWeight: 700, fontSize: 16 }}>
              {editingTx ? "Guardar Alterações" : "Salvar Movimento"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
